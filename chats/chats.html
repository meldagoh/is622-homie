<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.0/font/bootstrap-icons.css" />
    <link type="text/css" rel="stylesheet" href="https://unpkg.com/bootstrap/dist/css/bootstrap.min.css"/>
    <link type="text/css" rel="stylesheet" href="https://unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.min.css"/>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="plugins/bootstrap/bootstrap.min.css">

<body>
    <div id="main">
        <navbar-component></navbar-component>
    </div>

    <div class="body-inner" style="margin-top: 100px;">
        <section class="mx-auto">
            <div class="container">

                <!-- opening header -->
                <div class="row text-align-left ms-1">
                    <div>
                        <h1 class="fw-bold pb-2">Chats</h1>
                    </div>
                </div>

                <!-- No chats empty state -->
                <div id="noResults" class="text-center py-5 my-5 mx-auto">
                    <img class="mb-4" src="../images/tumbleweed.png" width="60px">
                    <p class="mb-0 fw-semibold">No chats found.</p>
                    <p class="small mt-1">Start a conversation by contacting a property agent.</p>
                </div>

            </div>
        </section>

        <div id="footer-mount">
            <footer-component></footer-component>
        </div>
    </div>

    <div>
        <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
        <script src="../components/navbar.js"></script>
        <script src="../components/footer.js"></script>
        <script src="plugins/jQuery/jquery.min.js"></script>
        <script src="plugins/bootstrap/bootstrap.min.js" defer></script>

        <script src="plugins/slick/slick-animation.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/shufflejs@5/dist/shuffle.min.js" defer></script>
        <script src="filter.js"></script>
        <script src="https://unpkg.com/bootstrap-vue@latest/dist/bootstrap-vue.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="home.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
